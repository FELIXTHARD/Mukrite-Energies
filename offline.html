<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:       #0A5C36;
    --green-mid:   #0D7A49;
    --green-light: #12A362;
    --red:         #D42B2B;
    --white:       #FFFFFF;
    --off-white:   #F6F8F5;
  }

  html, body {
    height: 100%;
    background: var(--green);
    font-family: 'Epilogue', sans-serif;
    color: var(--white);
    overflow: hidden;
  }

  /* animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 28px,
      rgba(255,255,255,0.03) 28px,
      rgba(255,255,255,0.03) 29px
    );
    pointer-events: none;
  }

  .container {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
    gap: 0;
  }

  /* Logo */
  .logo-wrap {
    width: 88px;
    height: 88px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(18,163,98,0.4); }
    50%       { box-shadow: 0 0 0 16px rgba(18,163,98,0); }
  }

  .logo-svg { width: 52px; height: 52px; }

  /* Wifi off icon */
  .wifi-icon {
    width: 56px;
    height: 56px;
    background: rgba(212,43,43,0.15);
    border: 1.5px solid rgba(212,43,43,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    font-size: 1.5rem;
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--green-light);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.9rem;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 14px;
    letter-spacing: -0.01em;
  }

  h1 span { color: var(--green-light); }

  p {
    font-size: 0.95rem;
    font-weight: 300;
    line-height: 1.65;
    color: rgba(255,255,255,0.65);
    max-width: 300px;
    margin-bottom: 36px;
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 2px;
    background: var(--red);
    border-radius: 2px;
    margin: 0 auto 32px;
  }

  /* Contact cards */
  .contacts {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 320px;
    margin-bottom: 32px;
  }

  .contact-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    text-decoration: none;
    color: var(--white);
    transition: background 0.25s, transform 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .contact-card:active {
    background: rgba(255,255,255,0.14);
    transform: scale(0.98);
  }

  .contact-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .contact-icon.call  { background: rgba(18,163,98,0.25); }
  .contact-icon.whats { background: rgba(37,211,102,0.2); }

  .contact-info { text-align: left; }
  .contact-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 2px;
  }
  .contact-value {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
  }

  /* Retry button */
  .retry-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 13px 28px;
    background: var(--white);
    color: var(--green);
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .retry-btn:active { transform: scale(0.97); opacity: 0.9; }

  .footer-note {
    position: fixed;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.06em;
  }
</style>
</head>
